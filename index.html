<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Opinio</title>
    <meta
      name="description"
      content="Discover who is rising and falling worldwide in real time. Vote on public figures, explore country trends, and see live rankings refreshed every 24 hours."
    />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="author" content="Opinio" />
    <link rel="canonical" href="https://opinio.live/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Opinio" />
    <meta property="og:url" content="https://opinio.live/" />
    <meta property="og:title" content="Opinio" />
    <meta
      property="og:description"
      content="Discover who is rising and falling worldwide in real time. Vote on public figures, explore country trends, and see live rankings refreshed every 24 hours."
    />
    <meta property="og:image" content="https://opinio.live/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Opinio live global social voting" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Opinio" />
    <meta
      name="twitter:description"
      content="Discover who is rising and falling worldwide in real time. Vote on public figures, explore country trends, and see live rankings."
    />
    <meta name="twitter:image" content="https://opinio.live/og-image.svg" />
    <meta name="twitter:image:alt" content="Opinio live global social voting" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Opinio",
        "url": "https://opinio.live/",
        "description": "Live global social voting platform where users vote on public figures and rankings refresh every 24 hours.",
        "inLanguage": ["en", "cs", "es"],
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://opinio.live/?country={country}",
          "query-input": "required name=country"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
