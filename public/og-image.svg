<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(970 70) rotate(130) scale(690 760)">
      <stop stop-color="#22D3EE" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <circle cx="140" cy="60" r="10" fill="#34D399"/>
  <circle cx="180" cy="60" r="10" fill="#22D3EE"/>
  <circle cx="220" cy="60" r="10" fill="#60A5FA"/>

  <text x="120" y="180" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="90" font-weight="800">Opinio</text>

  <!-- No Comments Badge -->
  <rect x="120" y="230" width="180" height="65" rx="10" fill="#EC4899" fill-opacity="0.2" stroke="#EC4899" stroke-width="2"/>
  <text x="210" y="262" fill="#FBE7F3" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">No Comments</text>
  <text x="210" y="285" fill="#FBCFE8" font-family="Segoe UI, Arial, sans-serif" font-size="13">Just voting</text>

  <!-- No Ads Badge -->
  <rect x="330" y="230" width="180" height="65" rx="10" fill="#10B981" fill-opacity="0.2" stroke="#10B981" stroke-width="2"/>
  <text x="420" y="262" fill="#D1FAE5" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">No Ads</text>
  <text x="420" y="285" fill="#A7F3D0" font-family="Segoe UI, Arial, sans-serif" font-size="13">Pure voting</text>

  <!-- Vote Free Badge -->
  <rect x="540" y="230" width="180" height="65" rx="10" fill="#3B82F6" fill-opacity="0.2" stroke="#3B82F6" stroke-width="2"/>
  <text x="630" y="262" fill="#DBEAFE" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Vote Free</text>
  <text x="630" y="285" fill="#BFDBFE" font-family="Segoe UI, Arial, sans-serif" font-size="13">Always free</text>

  <text x="120" y="350" fill="#CFFAFE" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="700">Express your opinion</text>
  <text x="120" y="400" fill="#A5F3FC" font-family="Segoe UI, Arial, sans-serif" font-size="30">Simply and honestly • No comments, just votes</text>
  <text x="120" y="445" fill="#86C6FF" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-style="italic">Seeded in EU 🇪🇺</text>

  <rect x="120" y="510" width="280" height="70" rx="14" fill="#0EA5A7" fill-opacity="0.24" stroke="#22D3EE" stroke-opacity="0.58" stroke-width="2"/>
  <text x="260" y="556" fill="#E0F2FE" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" text-anchor="middle">opinio.live</text>
</svg>
